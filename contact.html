<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jana Muhamed | Cybersecurity Portfolio</title>

<style>
:root {
    --bg-dark: #050505;
    --card-bg: #0d0d0d;
    --neon-cyan: #00f2ff;
    --neon-blue: #1f6feb;
    --text-gray: #aab2bb;
    --terminal-green: #00ff41;
}

body { 
    margin: 0; 
    font-family: 'JetBrains Mono', 'Fira Code', monospace; 
    background-color: var(--bg-dark);
    /* Subtle Cyber Grid Background */
    background-image: 
        linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    color: #e6edf3; 
    scroll-behavior: smooth; 
}

nav {
    position: fixed;
    right: 0;
    top: 0;
    height: 100vh;
    width: 220px;
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    background: rgba(5, 5, 5, 0.9);
    border-left: 1px solid var(--neon-cyan);
    backdrop-filter: blur(15px);
    z-index: 1000;
    box-shadow: -5px 0 20px rgba(0, 242, 255, 0.1);
}

nav a {
    color: var(--text-gray);
    margin: 15px 0;
    text-decoration: none;
    display: block;
    font-size: 0.9rem;
    letter-spacing: 1px;
    transition: 0.3s;
}

nav a:hover {
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    transform: translateX(-5px);
}

.container {
    max-width: 900px;
    margin-right: 240px; 
    padding: 120px 40px;
}

.fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.fade-up.show {
    opacity: 1;
    transform: translateY(0);
}

.contacts {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

/* Cyber Button Styling */
.btn {
    background: transparent;
    color: var(--neon-cyan);
    padding: 12px 24px;
    border: 1px solid var(--neon-cyan);
    border-radius: 4px;
    display: inline-flex;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn:hover {
    background: rgba(0, 242, 255, 0.1);
    box-shadow: 0 0 15px var(--neon-cyan);
    transform: translateY(-2px);
}

h1 { 
    font-size: 48px; 
    text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
}

h2 {
    color: var(--neon-cyan);
    border-left: 4px solid var(--neon-cyan);
    padding-left: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

p {
    color: var(--text-gray);
    line-height: 1.6;
}

footer {
    text-align: center;
    padding: 60px 30px;
    color: #444;
    font-size: 0.8rem;
    letter-spacing: 2px;
}

/* Glowing accent for the "active" feel */
.contacts p::before {
    content: "> ";
    color: var(--terminal-green);
}
</style>
</head>

<body>

<nav>
    <a href="index.html">// HOME</a>
    <a href="projects.html">// PROJECTS</a>
    <a href="certificates.html">// CERTIFICATES</a>
    <a href="contact.html">// CONTACT</a>
</nav>

<div class="container">
    <section id="contact" class="fade-up">
        <h2>System.Contact()</h2>
        <div class="contacts">
            <p>Explore my professional profiles and work experience below.</p>
            <div style="width: 100%; height: 20px;"></div> <a class="btn" href="mailto:janaamuhamed008@gmail.com">Email Me</a>
            <a class="btn" href="https://www.linkedin.com/in/janamuhamed" target="_blank">LinkedIn</a>
            <a class="btn" href="https://www.upwork.com/freelancers/~01abae447b7448b0d9?mp_source=share" target="_blank">Upwork</a>
            <a class="btn" href="https://www.freelancer.com/u/janamuhamed1?sb=t" target="_blank">Freelancer</a>
        </div>
    </section>

    <footer>
        [ AUTHENTICATED ] &copy; 2026 JANA MUHAMED
    </footer>
</div>

<script>
const elements = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
}, { threshold: 0.1 });

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
